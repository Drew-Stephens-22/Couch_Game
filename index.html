<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Couch Attack!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;user-select:none;overscroll-behavior:none;position:fixed;inset:0;}
canvas{display:block;position:fixed;inset:0;width:100vw;height:100vh;touch-action:none;}
canvas{width:100dvw;height:100dvh;} /* dvw/dvh track the real visible area on mobile Safari as its bars show/hide; vw/vh above is the fallback for browsers that don't support dv units */

/* ── Mobile touch controls ───────────────────────────────────── */
#mobileControls{ display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; width:100dvw; height:100dvh; z-index:50; pointer-events:none; }
#mobileControls.active{ display:block; }
.mbtn{
  position:absolute; pointer-events:auto; touch-action:none;
  display:flex; align-items:center; justify-content:center;
  background:rgba(40,40,50,.45); border:2px solid rgba(255,255,255,.35);
  color:#fff; font-family:'Courier New',monospace; font-weight:bold;
  border-radius:12px; -webkit-user-select:none; user-select:none;
  padding:0; margin:0; outline:none; -webkit-appearance:none; appearance:none;
  -webkit-tap-highlight-color:transparent;
}
.mbtn.active-touch{ background:rgba(120,120,140,.65); border-color:rgba(255,255,255,.7); }
/* Sized in vmin (relative to the shorter screen dimension) so the controls stay a
   sensible, comfortable size instead of dominating a short landscape phone screen.
   Pushed in well past the raw screen edge so iOS's edge-swipe-back gesture doesn't
   swallow the touch before the left-arrow button ever sees it, and offset by the
   safe-area insets so nothing sits under a notch/home-indicator/rounded corner. */
#dpad{
  position:absolute; left:calc(env(safe-area-inset-left,0px) + 3vmin); bottom:calc(env(safe-area-inset-bottom,0px) + 3vmin);
  width:38vmin; height:38vmin; max-width:190px; max-height:190px; pointer-events:none;
}
#dpad .mbtn{ width:32%; height:32%; font-size:min(5vmin,22px); }
#btnUp{ left:34%; top:0; }
#btnDown{ left:34%; top:66%; }
#btnLeft{ left:0; top:34%; }
#btnRight{ left:66%; top:34%; }
#btnShoot{
  position:absolute; right:calc(env(safe-area-inset-right,0px) + 4vmin); bottom:calc(env(safe-area-inset-bottom,0px) + 4vmin);
  width:20vmin; height:20vmin; max-width:100px; max-height:100px; min-width:64px; min-height:64px; border-radius:50%;
  background:rgba(198,40,40,.55); border:3px solid rgba(255,255,255,.55); font-size:min(3.2vmin,15px);
}
#btnShoot.active-touch{ background:rgba(239,83,80,.8); }

#btnFullscreen{
  display:none; position:fixed; top:calc(env(safe-area-inset-top,0px) + 14px); right:calc(env(safe-area-inset-right,0px) + 14px); z-index:60; pointer-events:auto;
  width:46px; height:46px; border-radius:10px; touch-action:none;
  align-items:center; justify-content:center; font-size:22px;
  background:rgba(40,40,50,.55); border:2px solid rgba(255,255,255,.4); color:#fff;
  padding:0; margin:0; outline:none; -webkit-appearance:none; appearance:none;
  -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
}
#btnFullscreen.active{ display:flex; }

#rotateOverlay{
  display:none; position:fixed; inset:0; z-index:9999; background:#000; color:#fff;
  align-items:center; justify-content:center; text-align:center; padding:30px;
  font-family:'Courier New',monospace; font-size:20px; line-height:1.6;
}
@media (orientation:portrait) and (pointer:coarse){
  #rotateOverlay{ display:flex; }
}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="mobileControls">
  <div id="dpad">
    <button id="btnUp" class="mbtn">▲</button>
    <button id="btnDown" class="mbtn">▼</button>
    <button id="btnLeft" class="mbtn">◀</button>
    <button id="btnRight" class="mbtn">▶</button>
  </div>
  <button id="btnShoot" class="mbtn">FIRE</button>
</div>

<button id="btnFullscreen" title="Toggle Fullscreen">⛶</button>

<div id="rotateOverlay">
  <div>🔄<br>Please rotate your device<br>to landscape to play</div>
</div>

<script>
// ================================================================
//  COUCH ATTACK! — 3D Island Shooter
// ================================================================

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){
  // Read the canvas's actual on-screen size (driven by the dvw/dvh CSS) rather than
  // window.innerWidth/innerHeight, which on mobile Safari can lag behind or ignore
  // the toolbar's current show/hide state and leave part of the game hidden.
  const rect = canvas.getBoundingClientRect();
  W = canvas.width  = Math.max(1, Math.round(rect.width));
  H = canvas.height = Math.max(1, Math.round(rect.height));
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>{ setTimeout(resize, 50); setTimeout(resize, 300); });
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}

// ── math ────────────────────────────────────────────────────────
const TAU = Math.PI * 2;
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function rr(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function rrFill(x,y,w,h,r){ rr(x,y,w,h,r); ctx.fill(); }
function rrStroke(x,y,w,h,r){ rr(x,y,w,h,r); ctx.stroke(); }

// ── perspective ─────────────────────────────────────────────────
const HORIZON  = 0.40;
const FOV_HALF = Math.PI * 0.32;  
const CAMERA_HEIGHT = 50; 

//Main movement of everything
//Main movement of everything
function project(wx, wz, wy = 0){ 
  const dx = wx - player.x;
  const dz = wz - player.z;

  // 1. YAW ROTATION (Looking Left/Right)
  const cosYaw = Math.cos(player.yaw);
  const sinYaw = Math.sin(player.yaw);
  const x1 = dx * cosYaw - dz * sinYaw;
  const z1 = dx * sinYaw + dz * cosYaw;

  // If the object is behind the player on the floor plane, don't render it
  if (z1 < 1) return null; 

  // 2. SCREEN PROJECTION
  const y1 = CAMERA_HEIGHT - wy; 
  const invZ = 1 / z1; 
  const fovFactor = W / (2 * Math.tan(FOV_HALF));

  const sx = W/2 + x1 * invZ * fovFactor;
  
  // Y-shearing for looking up/down
  const pitchOffset = player.pitch * fovFactor;
  const sy = H * HORIZON - pitchOffset + y1 * invZ * fovFactor;
  
  // Scale the sprite based on distance and screen height
  const scale = invZ * (H * 0.55);

  // Send all this useful data back to whatever needs to draw the sprite
  return { sx, sy, scale, cz: z1, dist: Math.hypot(dx,dz) };
}

// ── game state & controls ───────────────────────────────────────
const LEVEL_DATA = [

    // ── theme ──

  },
  {
    id: 'level3',

    shape: 'square',
    width: 800,
    depth: 800, // A large, open square

    baseSpawnInterval: 70,
    enemies: ['loveseat', 'sofa2', 'sofa3', 'sectional'],
    maxWaves: 5,
    boss: 'boss_futon',
    // ── theme ──
    wallColor: '#5b5f63', wallBase: '#2e3033', wallHeight: 130,
    hasCeiling: true, ceilColor: '#26282b',
    floorTop: '#3a3a3a', floorBottom: '#55534e',
    washTop: 'rgba(0,0,0,0.25)', washBottom: 'rgba(0,0,0,0.55)',
    skyType: 'void'
  },
  {
    id: 'level4',
    name: 'Level 4: The Bedroom',
    shape: 'square',
    width: 500,
    depth: 600, // A tighter, claustrophobic space

    difficultyOffset: 8, 
    baseSpawnInterval: 65,
    enemies: ['sofa2', 'sofa3', 'sectional'],
    maxWaves: 5,
    boss: 'boss_futon',
    // ── theme ──
    wallColor: '#8574b0', wallBase: '#4a3f66', wallHeight: 140,
    hasCeiling: true, ceilColor: '#3d3560',
    floorTop: '#5b4636', floorBottom: '#7a6046',
    washTop: 'rgba(90,60,140,0.12)', washBottom: 'rgba(90,60,140,0.4)',
    skyType: 'night'
  },
  {
    id: 'level5',
    name: 'Level 5: The Backyard',
    shape: 'square', // You might want to change this back to 'circle' later!
    width: 1000,
    depth: 1000, // Massive arena
    startingWave: 1,
    difficultyOffset: 10, 
    baseSpawnInterval: 60,
    enemies: ['armchair', 'sofa2', 'sofa3', 'sectional'],
    maxWaves: 5,
    boss: 'boss_futon',
    // ── theme (open-air, no ceiling, wooden fence walls) ──
    wallColor: '#8d6e4a', wallBase: '#5c4630', wallHeight: 90,
    hasCeiling: false, ceilColor: '#000000',
    floorTop: '#3d7a34', floorBottom: '#5fa84c',
    washTop: 'rgba(101,67,33,0.06)', washBottom: 'rgba(101,67,33,0.28)',
    skyType: 'outdoor'
  }
];

let currentLevel = null;
let roomProps = [];
let gState = 'start';
let score=0, lives=3, kills=0, wave=1;
let waveTimer=0, waveInterval=1800;
let spawnTimer=0, spawnInterval=110;
let gameTime=0;
let nextPowerupScore = 1500;

// Wave Animation State
let waveAnimTimer = 0;
let waveAnimOld = 1;
let waveAnimNew = 2;

let gunCooldown=0, gunFireRate=18, gunDamage=1;
let activePowerup=null, powerupTimer=0;
const POWERUP_DURATION = 600;
const POWERUP_COLOR = { rapidfire:'#00e5ff', heavyshot:'#ff9800', freeze:'#4fc3f7', fire:'#ff5722', health:'#e53935' };
const POWERUP_ICON  = { rapidfire:'⚡', heavyshot:'💥', freeze:'❄', fire:'🔥', health:'❤' };
const POWERUP_LABEL = { rapidfire:'RAPID', heavyshot:'HEAVY', freeze:'FREEZE', fire:'FIRE', health:'HEALTH' };
const POWERUP_HUD_LABEL = { rapidfire:'⚡ RAPID FIRE', heavyshot:'💥 HEAVY SHOT', freeze:'❄ FROZEN SHOT', fire:'🔥 FIRE SHOT' };

let hitFlash=0, shakeMag=0, shakeX=0, shakeY=0;
let menuTime=0, menuRAF=null, gameRAF=null;
let hoveredBtn = null;
let mouseDown  = false;

const player = { x:0, z:0, yaw:0, pitch:0, speed:3.0, radius:14 };
const keys   = {};

// Key Bindings State
const controls = { 
  forward: 'KeyW', 
  backward: 'KeyS', 
  left: 'KeyA', 
  right: 'KeyD', 
  shoot: 'Space',
  pause: 'Escape'
};
let waitingForBind = null;
let mouseSensitivity = parseFloat(localStorage.getItem('mouseSensitivity')) || 1.0;

let bullets       = [];
let enemies       = [];
let powerups      = [];
let particles     = [];
let scoreFloats   = [];
let palmTrees     = [];
let groundDetails = [];
let shorePoints   = [];

// ── input ────────────────────────────────────────────────────────
window.addEventListener('keydown', e=>{
  // Handle key rebinding
  if(gState === 'settings' && waitingForBind) {
    e.preventDefault();
    controls[waitingForBind] = e.code;
    waitingForBind = null;
    return;
  }
  // Handle Pause Toggle
  if (e.code === controls.pause) {
    if (gState === 'playing') {
      gState = 'paused';
      if(document.exitPointerLock) document.exitPointerLock();
      canvas.style.cursor = 'default';
      cancelAnimationFrame(gameRAF); // Freeze the game loop
      menuLoop();                    // Start the menu loop
    } else if (gState === 'paused') {
      resumeGame();
    }
  }
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});

//resumeGame
function resumeGame() {
  gState = 'playing';
  cancelAnimationFrame(menuRAF);
  canvas.style.cursor = 'none';
  if (!isTouchDevice && canvas.requestPointerLock) canvas.requestPointerLock();
  gameRAF = requestAnimationFrame(gameLoop);
}

window.addEventListener('keyup', e=>{ keys[e.code]=false; });

document.addEventListener('pointerlockchange', () => {
  // If the browser unlocks the mouse while we are actively playing, trigger the pause!
  if (document.pointerLockElement !== canvas && gState === 'playing') {
    gState = 'paused';
    canvas.style.cursor = 'default';
    cancelAnimationFrame(gameRAF); // Freeze the 3D game loop
    menuLoop();                    // Fire up the pause menu loop
  }
});

canvas.addEventListener('mousemove', e=>{
  if(gState==='playing'){
    if(document.pointerLockElement===canvas){
      player.yaw += e.movementX * 0.0022 * mouseSensitivity;
      player.pitch += e.movementY * 0.007 * mouseSensitivity; 
      player.pitch = clamp(player.pitch, -2.8, 2.8);
    }
  } else {
    const r=canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    hoveredBtn=null;
    getButtons().forEach(b=>{
      if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h) hoveredBtn=b.id;
    });
    canvas.style.cursor = hoveredBtn ? 'pointer' : 'default';
  }
});

canvas.addEventListener('click', ()=>{ 
  if(!isTouchDevice && gState==='playing' && document.pointerLockElement!==canvas) {
    canvas.requestPointerLock(); 
  }
});

canvas.addEventListener('mousedown', e=>{
  if(isTouchDevice) return; // touch taps are fully handled by the dedicated pointerdown handler below; without this guard, mobile Safari's synthetic mousedown re-processes the same tap against whatever screen the pointerdown already switched to
  if(gState==='playing'){ mouseDown=true; return; }
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  getButtons().forEach(b=>{
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h) handleBtn(b.id);
  });
});
canvas.addEventListener('mouseup', ()=>mouseDown=false);
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// ── mobile / touch support ───────────────────────────────────────
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const mobileControlsEl = document.getElementById('mobileControls');
const rotateOverlayEl  = document.getElementById('rotateOverlay');
const btnFullscreenEl  = document.getElementById('btnFullscreen');

// ── fullscreen toggle (hides Safari's address/tab bar so it doesn't eat into the play area) ──
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
function enterFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if(req){ req.call(el).catch ? req.call(el).catch(()=>{}) : req.call(el); }
  // Fallback nudge for browsers (older iOS Safari) that don't support the Fullscreen API at all:
  // scrolling by 1px makes Safari's chrome collapse on its own.
  setTimeout(()=>{ window.scrollTo(0,1); }, 60);
}
function exitFullscreen(){
  const ex = document.exitFullscreen || document.webkitExitFullscreen;
  if(ex){ const r = ex.call(document); if(r && r.catch) r.catch(()=>{}); }
}
function updateFullscreenIcon(){
  btnFullscreenEl.textContent = isFullscreen() ? '⤓' : '⛶';
}
document.addEventListener('fullscreenchange', updateFullscreenIcon);
document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
btnFullscreenEl.addEventListener('pointerdown', e=>{
  e.preventDefault(); e.stopPropagation();
  if(isFullscreen()) exitFullscreen(); else enterFullscreen();
});

// Drag-to-look: touching anywhere on the canvas (that isn't one of the dedicated
// D-pad/FIRE buttons, which are separate elements above the canvas) starts a look
// drag that tracks that same finger until it lifts off the screen.
let lookPointerId = null, lookLastX = 0, lookLastY = 0;

canvas.addEventListener('pointerdown', e=>{
  if(e.pointerType !== 'touch') return;
  if(gState !== 'playing'){
    e.preventDefault();
    // Menu/UI taps on touch devices, mirroring the desktop mousedown button handling
    const r=canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    getButtons().forEach(b=>{ if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h) handleBtn(b.id); });
    return;
  }
  if(lookPointerId === null){
    e.preventDefault();
    lookPointerId = e.pointerId;
    lookLastX = e.clientX; lookLastY = e.clientY;
  }
});
canvas.addEventListener('pointermove', e=>{
  if(e.pointerType !== 'touch' || gState !== 'playing') return;
  if(e.pointerId === lookPointerId){
    const dx = e.clientX - lookLastX, dy = e.clientY - lookLastY;
    player.yaw += dx * 0.0035 * mouseSensitivity;
    player.pitch += dy * 0.011 * mouseSensitivity;
    player.pitch = clamp(player.pitch, -2.8, 2.8);
    lookLastX = e.clientX; lookLastY = e.clientY;
  }
});
function releaseLookTouch(e){
  if(e.pointerType !== 'touch') return;
  if(e.pointerId === lookPointerId) lookPointerId = null;
}
canvas.addEventListener('pointerup', releaseLookTouch);
canvas.addEventListener('pointercancel', releaseLookTouch);
canvas.addEventListener('pointerleave', releaseLookTouch);

if(isTouchDevice){
  // Wires a press-and-hold button: fires onDown while pressed, onUp the moment the finger lifts (even if it slides off the button)
  function bindHold(el, onDown, onUp){
    el.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation();
      try{ el.setPointerCapture(e.pointerId); }catch(err){}
      el.classList.add('active-touch');
      onDown();
    });
    const release = e=>{
      e.preventDefault(); e.stopPropagation();
      el.classList.remove('active-touch');
      onUp();
    };
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', release);
  }

  bindHold(document.getElementById('btnUp'),    ()=>keys[controls.forward]=true,  ()=>keys[controls.forward]=false);
  bindHold(document.getElementById('btnDown'),  ()=>keys[controls.backward]=true, ()=>keys[controls.backward]=false);
  bindHold(document.getElementById('btnLeft'),   ()=>keys[controls.left]=true,     ()=>keys[controls.left]=false);
  bindHold(document.getElementById('btnRight'),  ()=>keys[controls.right]=true,    ()=>keys[controls.right]=false);
  bindHold(document.getElementById('btnShoot'),  ()=>mouseDown=true,               ()=>mouseDown=false);

  // Best-effort landscape lock (silently ignored on browsers/devices that don't support it - the CSS rotate overlay is the reliable fallback)
  window.addEventListener('touchstart', function tryLockOrientation(){
    if(screen.orientation && screen.orientation.lock){ screen.orientation.lock('landscape').catch(()=>{}); }
    window.removeEventListener('touchstart', tryLockOrientation);
  }, {once:true});
}

// ── couch sprite drawing ─────────────────────────────────────────
function drawBeanBag(w,h,col,acc,fl){
  ctx.fillStyle=fl?'#fff':col; ctx.beginPath(); ctx.ellipse(0,0,w*.5,h*.55,0,0,TAU); ctx.fill();
  ctx.fillStyle=fl?'#eee':acc; ctx.beginPath(); ctx.ellipse(-w*.1,-h*.1,w*.28,h*.22,-.3,0,TAU); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-w*.15,-h*.08,w*.11,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc( w*.15,-h*.08,w*.11,0,TAU); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-w*.12,-h*.08,w*.055,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc( w*.18,-h*.08,w*.055,0,TAU); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,h*.08,w*.12,.2,Math.PI-.2); ctx.stroke();
}
function drawArmchair(w,h,col,acc,fl){
  const c=fl?'#fff':col, a=fl?'#ddd':acc; ctx.fillStyle='#7a5230';
  ctx.fillRect(-w*.35, h*.26, w*.09, h*.28); ctx.fillRect( w*.26, h*.26, w*.09, h*.28);
  ctx.fillStyle=c; rrFill(-w*.4,-h*.15,w*.8,h*.44,9); ctx.fillStyle=a; rrFill(-w*.38,-h*.57,w*.76,h*.45,9);
  ctx.fillStyle=a; rrFill(-w*.5,-h*.42,w*.14,h*.58,7); rrFill(w*.36,-h*.42,w*.14,h*.58,7);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-w*.16,-h*.3,w*.1,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc( w*.16,-h*.3,w*.1,0,TAU); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-w*.13,-h*.3,w*.05,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc( w*.19,-h*.3,w*.05,0,TAU); ctx.fill();
}
function drawLoveseat(w,h,col,acc,fl){
  const c=fl?'#fff':col, a=fl?'#ddd':acc; ctx.fillStyle='#7a5230';
  ctx.fillRect(-w*.4,h*.3,w*.09,h*.26); ctx.fillRect(w*.31,h*.3,w*.09,h*.26);

// ── environment generation ───────────────────────────────────────
function generateEnvironment(levelConfig){
  palmTrees = []; groundDetails = []; shorePoints = []; roomProps = [];
  
  if (levelConfig.shape === 'circle') {
    const radius = levelConfig.radius;
    for(let i=0; i<18; i++){
      const ang = (i/18)*TAU + (Math.random()-.5)*.4;
      const r   = 70 + Math.random()*(radius - 110);
      palmTrees.push({
        wx: Math.cos(ang)*r, wz: Math.sin(ang)*r,
        height: 90+Math.random()*60, lean: (Math.random()-.5)*.24,
        sway: Math.random()*TAU, seed: Math.random()*100
      });
    }
    for(let i=0; i<180; i++){
      const ang = Math.random()*TAU;
      const r   = Math.random()*radius;
      groundDetails.push({ wx: Math.cos(ang)*r, wz: Math.sin(ang)*r, type: Math.random() < 0.3 ? 'rock' : 'grass', size: 0.5 + Math.random() * 0.8 });
    }
    for(let a=0; a<TAU; a+=0.04){ shorePoints.push({wx: Math.cos(a)*radius, wz: Math.sin(a)*radius}); }
  } 
  else if (levelConfig.shape === 'square') {
    const hw = levelConfig.width / 2;
    const hd = levelConfig.depth / 2;
    
    // Generate 30-unit wide wall panels (keeps the sorting algorithm happy)
    for(let x = -hw; x <= hw; x += 30) {
      if(Math.abs(x) > 60) { 
        roomProps.push({wx: x, wz: -hd, type: 'wall', wx1: x-15, wz1: -hd, wx2: x+15, wz2: -hd});
        roomProps.push({wx: x, wz: hd, type: 'wall', wx1: x-15, wz1: hd, wx2: x+15, wz2: hd});
      }
    }
    for(let z = -hd; z <= hd; z += 30) {
      if(Math.abs(z) > 60) { 
        roomProps.push({wx: -hw, wz: z, type: 'wall', wx1: -hw, wz1: z-15, wx2: -hw, wz2: z+15});
        roomProps.push({wx: hw, wz: z, type: 'wall', wx1: hw, wz1: z-15, wx2: hw, wz2: z+15});
      }
    }
    
    // Add props themed to this specific level
    if (levelConfig.id === 'level1') {
      roomProps.push({wx: hw - 40, wz: hd - 40, type: 'tv'});
      roomProps.push({wx: -hw + 40, wz: -hd, type: 'painting'});
    } else if (levelConfig.id === 'level2') {
      // ── The Kitchen ──
      roomProps.push({wx: hw - 45, wz: -hd + 45, type: 'fridge'});
      roomProps.push({wx: -20,     wz: -hd + 35, type: 'stove'});
      roomProps.push({wx: 130,    wz: -hd + 32, type: 'counter'});
      roomProps.push({wx: -140,   wz: -hd + 32, type: 'counter'});
      roomProps.push({wx: -hw + 45, wz: hd - 55, type: 'wallcabinet'});
      roomProps.push({wx: 0,      wz: 70,       type: 'table'});
    } else if (levelConfig.id === 'level3') {
      // ── The Basement ──
      roomProps.push({wx: hw - 55, wz: -hd + 48, type: 'washer'});
      roomProps.push({wx: hw - 55, wz: -hd + 120, type: 'dryer'});
      roomProps.push({wx: -hw + 60, wz: -hd + 45, type: 'workbench'});
      roomProps.push({wx: -hw + 20, wz: -hd + 45, type: 'pegboard'});
      roomProps.push({wx: -hw + 70, wz: hd - 90, type: 'shelf'});
      roomProps.push({wx: 0, wz: 0, type: 'hanginglight'});
    } else if (levelConfig.id === 'level4') {
      // ── The Bedroom ──
      roomProps.push({wx: 0,        wz: hd - 95,  type: 'bed'});
      roomProps.push({wx: 105,      wz: hd - 55,  type: 'nightstand'});
      roomProps.push({wx: -hw + 55, wz: -hd + 55, type: 'dresser'});
      roomProps.push({wx: -hw + 40, wz: 20,       type: 'wardrobe'});
    } else if (levelConfig.id === 'level5') {
      // ── The Backyard ──
      roomProps.push({wx: hw - 80,  wz: hd - 80,  type: 'grill'});
      roomProps.push({wx: 0,        wz: 30,       type: 'picnictable'});
      roomProps.push({wx: -hw + 75, wz: -hd + 75, type: 'bush'});
      roomProps.push({wx: -hw + 65, wz: hd - 110, type: 'bush'});
      roomProps.push({wx: hw - 100, wz: -hd + 100, type: 'stump'});
    }
  }
}

// ── environment drawing ──────────────────────────────────────────
function getHorizonY() {
  const fovFactor = W / (2 * Math.tan(FOV_HALF));
  return H * HORIZON - player.pitch * fovFactor;
}

function drawSky(){
  const hy = getHorizonY();
  const drawHy = Math.max(0, hy); 

  if (drawHy > 0) {
    if (currentLevel.shape === 'circle') {
      // Island Sky
      const g = ctx.createLinearGradient(0,0,0, drawHy);
      g.addColorStop(0,'#042a5e'); g.addColorStop(.6,'#1060b8'); g.addColorStop(1,'#29b6f6');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);
      
      // The panorama is exactly twice the screen width
      const skyWidth = W * 2;
      const panX = -(player.yaw / TAU) * skyWidth;
      const pitchOffset = hy - (H * HORIZON); // Shift clouds based on 3D horizon
      
      const drawElements = () => {
        ctx.save(); ctx.translate(0, pitchOffset);
        
        // Draw the Sun
        const sx=W*.78, sy=H*.09;
        const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,70);
        sg.addColorStop(0,'#fffde7'); sg.addColorStop(.3,'#fff176');
        sg.addColorStop(.7,'rgba(255,235,59,.3)'); sg.addColorStop(1,'rgba(255,255,59,0)');
        ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,70,0,TAU); ctx.fill();
        ctx.fillStyle='#fffde7'; ctx.beginPath(); ctx.arc(sx,sy,26,0,TAU); ctx.fill();
        
        // Expanded Cloud Array:
        // [x_percent_of_skyWidth, y_percent_of_H, width, height]
        // Ranging from 0.05 to 0.95 spreads them 360 degrees.
        // Negative Y values push the clouds much higher into the sky.
        [
          [.05,  .07,  90,  28],
          [.15, -.15,  110, 32], // Higher up
          [.25,  .11,  110, 32],
          [.35, -.05,  85,  25], // Mid-high
          [.45,  .06,  75,  24],
          [.55, -.25,  120, 40], // Directly overhead
          [.65,  .02,  80,  25],
          [.75, -.10,  95,  30],
          [.85,  .13,  65,  20],
          [.95, -.20,  100, 35]  // High up
        ].forEach(([px,py,cw,ch])=>{
          // Calculate positions relative to the full panorama width
          const cx2=skyWidth*px, cy2=H*py; 
          ctx.fillStyle='rgba(255,255,255,.88)';
          
          [[0,0,cw*.5,ch*.52],[-cw*.27,ch*.1,cw*.34,ch*.42],[cw*.27,ch*.1,cw*.34,ch*.42],[0,ch*.14,cw*.44,ch*.38]]
            .forEach(([ox,oy,rx,ry])=>{ 
              ctx.beginPath(); ctx.ellipse(cx2+ox,cy2+oy,rx,ry,0,0,TAU); ctx.fill(); 
            });
        });
        ctx.restore();
      };
      
      // Draw the skybox 3 times to handle seamless looping when turning
      ctx.save(); ctx.translate(panX % skyWidth, 0); drawElements(); ctx.restore();
      ctx.save(); ctx.translate((panX % skyWidth) + skyWidth, 0); drawElements(); ctx.restore();
      ctx.save(); ctx.translate((panX % skyWidth) - skyWidth, 0); drawElements(); ctx.restore();
      
    } else {
      const skyType = currentLevel.skyType || 'sunset';
      const skyWidth = W * 2;
      const panX = -(player.yaw / TAU) * skyWidth;
      const pitchOffset = hy - (H * HORIZON);

      // Helper to draw a panorama 3x for seamless turning
      const renderPanorama = (drawElements) => {
        ctx.save(); ctx.translate(panX % skyWidth, 0); drawElements(); ctx.restore();
        ctx.save(); ctx.translate((panX % skyWidth) + skyWidth, 0); drawElements(); ctx.restore();
        ctx.save(); ctx.translate((panX % skyWidth) - skyWidth, 0); drawElements(); ctx.restore();
      };

      if (skyType === 'sunset') {
        // Level 1: Pinkish Tinted Sunset Skybox
        const g = ctx.createLinearGradient(0,0,0, drawHy);
        g.addColorStop(0,'#4a148c');  // Deep purple top
        g.addColorStop(.5,'#e27289'); // Simpsons pink mid
        g.addColorStop(1,'#f3b49f');  // Peachy horizon
        ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);

        renderPanorama(() => {
          ctx.save(); ctx.translate(0, pitchOffset);
          const sx=W*.5, sy=H*.15;
          const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,90);
          sg.addColorStop(0,'#fffde7'); sg.addColorStop(.2,'#ffb74d');
          sg.addColorStop(.6,'rgba(243,180,159,.6)'); sg.addColorStop(1,'rgba(243,180,159,0)');
          ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,90,0,TAU); ctx.fill();
          [
            [.1, .05, 100, 30], [.3, -.1, 120, 35], [.5, .15, 80, 25],
            [.7, -.05, 110, 32], [.9, .08, 90, 28]
          ].forEach(([px,py,cw,ch])=>{
            const cx2=skyWidth*px, cy2=H*py; 
            ctx.fillStyle='rgba(255, 200, 220, 0.7)';
            [[0,0,cw*.5,ch*.52],[-cw*.27,ch*.1,cw*.34,ch*.42],[cw*.27,ch*.1,cw*.34,ch*.42],[0,ch*.14,cw*.44,ch*.38]]
              .forEach(([ox,oy,rx,ry])=>{ ctx.beginPath(); ctx.ellipse(cx2+ox,cy2+oy,rx,ry,0,0,TAU); ctx.fill(); });
          });
          ctx.restore();
        });

      } else if (skyType === 'day') {
        // Level 2 - Kitchen: bright airy window daylight
        const g = ctx.createLinearGradient(0,0,0, drawHy);
        g.addColorStop(0,'#bfe6f5'); g.addColorStop(.6,'#e8f7ff'); g.addColorStop(1,'#fffef2');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);

        renderPanorama(() => {
          ctx.save(); ctx.translate(0, pitchOffset);
          const sx=W*.7, sy=H*.1;
          const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,80);
          sg.addColorStop(0,'#fffff0'); sg.addColorStop(.3,'#fff9c4');
          sg.addColorStop(.7,'rgba(255,249,196,.3)'); sg.addColorStop(1,'rgba(255,249,196,0)');
          ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,80,0,TAU); ctx.fill();
          [[.15,.05,90,26],[.4,-.08,100,28],[.65,.1,80,24],[.85,-.04,95,26]].forEach(([px,py,cw,ch])=>{
            const cx2=skyWidth*px, cy2=H*py;
            ctx.fillStyle='rgba(255,255,255,.85)';
            [[0,0,cw*.5,ch*.52],[-cw*.27,ch*.1,cw*.34,ch*.42],[cw*.27,ch*.1,cw*.34,ch*.42],[0,ch*.14,cw*.44,ch*.38]]
              .forEach(([ox,oy,rx,ry])=>{ ctx.beginPath(); ctx.ellipse(cx2+ox,cy2+oy,rx,ry,0,0,TAU); ctx.fill(); });
          });
          ctx.restore();
        });

      } else if (skyType === 'void') {
        // Level 3 - Basement: no windows, just dim unlit space above the walls
        const g = ctx.createLinearGradient(0,0,0, drawHy);
        g.addColorStop(0,'#1c1f22'); g.addColorStop(1,'#33363a');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);

      } else if (skyType === 'night') {
        // Level 4 - Bedroom: night window with moon and stars
        const g = ctx.createLinearGradient(0,0,0, drawHy);
        g.addColorStop(0,'#0a0a2e'); g.addColorStop(.6,'#1a1a4e'); g.addColorStop(1,'#2d2d6e');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);

        renderPanorama(() => {
          ctx.save(); ctx.translate(0, pitchOffset);
          for(let i=0;i<40;i++){
            ctx.save(); ctx.globalAlpha=.4+Math.sin(menuTime*.03+i)*.3;
            ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc((i*173)%skyWidth,(i*57)%(H*.45),1+((i%3)*.6),0,TAU); ctx.fill();
            ctx.restore();
          }
          const sx=W*.6, sy=H*.12;
          const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,55);
          sg.addColorStop(0,'#fdfdf5'); sg.addColorStop(.5,'#e8e8d0'); sg.addColorStop(1,'rgba(232,232,208,0)');
          ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,55,0,TAU); ctx.fill();
          ctx.fillStyle='#f5f5e8'; ctx.beginPath(); ctx.arc(sx,sy,22,0,TAU); ctx.fill();
          ctx.restore();
        });

      } else if (skyType === 'outdoor') {
        // Level 5 - Backyard: open blue daytime sky
        const g = ctx.createLinearGradient(0,0,0, drawHy);
        g.addColorStop(0,'#1976d2'); g.addColorStop(.6,'#4fc3f7'); g.addColorStop(1,'#bbdefb');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,drawHy);

        renderPanorama(() => {
          ctx.save(); ctx.translate(0, pitchOffset);
          const sx=W*.8, sy=H*.08;
          const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,75);
          sg.addColorStop(0,'#fffde7'); sg.addColorStop(.3,'#fff176');
          sg.addColorStop(.7,'rgba(255,235,59,.3)'); sg.addColorStop(1,'rgba(255,255,59,0)');
          ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,75,0,TAU); ctx.fill();
          ctx.fillStyle='#fffde7'; ctx.beginPath(); ctx.arc(sx,sy,28,0,TAU); ctx.fill();
          [[.1,.06,100,30],[.3,-.1,120,34],[.5,.12,85,26],[.7,-.06,110,30],[.9,.09,90,27]].forEach(([px,py,cw,ch])=>{
            const cx2=skyWidth*px, cy2=H*py;
            ctx.fillStyle='rgba(255,255,255,.9)';
            [[0,0,cw*.5,ch*.52],[-cw*.27,ch*.1,cw*.34,ch*.42],[cw*.27,ch*.1,cw*.34,ch*.42],[0,ch*.14,cw*.44,ch*.38]]
              .forEach(([ox,oy,rx,ry])=>{ ctx.beginPath(); ctx.ellipse(cx2+ox,cy2+oy,rx,ry,0,0,TAU); ctx.fill(); });
          });
          ctx.restore();
        });
      }
    }
  }
}

function drawGround(){
  const hy = getHorizonY();
  if(hy >= H) return; 
  const startY = Math.max(0, hy);

  if (currentLevel.shape === 'circle') {
    // Ocean and Sand
    const og=ctx.createLinearGradient(0, startY, 0, startY+40);
    og.addColorStop(0,'#0d47a1'); og.addColorStop(1,'#1976d2');
    ctx.fillStyle=og; ctx.fillRect(0, startY, W, H - startY);
    const sandY = Math.max(0, hy+12);
    const ig=ctx.createLinearGradient(0, sandY, 0, H);
    ig.addColorStop(0,'#d4b46a'); ig.addColorStop(1,'#e8c97a');
    ctx.fillStyle=ig; ctx.fillRect(0, sandY, W, H - sandY);
  } else {
    // Themed Floor (hardwood / tile / concrete / carpet / grass depending on level)
    const fg=ctx.createLinearGradient(0, startY, 0, H);
    fg.addColorStop(0, currentLevel.floorTop || '#8d5524');
    fg.addColorStop(1, currentLevel.floorBottom || '#c68642');
    ctx.fillStyle=fg; ctx.fillRect(0, startY, W, H - startY);
    
    // Themed Wash (rug / grime / carpet plush / dirt patch depending on level)
    const rugY = Math.max(0, hy+30);
    const rugG = ctx.createLinearGradient(0, rugY, 0, H);
    rugG.addColorStop(0, currentLevel.washTop || 'rgba(76, 175, 80, 0.2)');
    rugG.addColorStop(1, currentLevel.washBottom || 'rgba(76, 175, 80, 0.7)');
    ctx.fillStyle = rugG;
    ctx.fillRect(0, rugY, W, H - rugY);
  }
}


function drawShoreBoundary() {
  if (currentLevel.shape !== 'circle') return;
  const sorted = [...shorePoints].sort((a,b) => Math.hypot(b.wx-player.x, b.wz-player.z) - Math.hypot(a.wx-player.x, a.wz-player.z));
  sorted.forEach(sp => {
    const p = project(sp.wx, sp.wz);
    if (!p || p.cz > 900) return;
    const sc = clamp(p.scale/100, 0.1, 10);
    ctx.fillStyle = '#1976d2'; ctx.beginPath(); ctx.ellipse(p.sx, p.sy + 3*sc, 22*sc, 6*sc, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.ellipse(p.sx, p.sy, 18*sc, 4*sc, 0, 0, TAU); ctx.fill();
  });
}

function drawGroundDetails() {
  if (currentLevel.shape !== 'circle') return;
  groundDetails.forEach(gd => {
    const p = project(gd.wx, gd.wz);
    if(!p || p.cz > 600) return;
    const sc = clamp(p.scale/2, 0.2, 15);
    ctx.save();
    if(gd.type === 'rock') {
      ctx.fillStyle = '#a19d94'; ctx.beginPath(); ctx.ellipse(p.sx, p.sy, 5*sc*gd.size, 2.5*sc*gd.size, 0, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = '#4caf50'; ctx.beginPath(); ctx.moveTo(p.sx, p.sy); 
      ctx.lineTo(p.sx - 3*sc*gd.size, p.sy - 6*sc*gd.size); ctx.lineTo(p.sx + 3*sc*gd.size, p.sy - 4*sc*gd.size); ctx.fill();
    }
    ctx.restore();
  });
}
function drawCeiling() {
  if (currentLevel.shape !== 'square') return;

function drawPalmTree(tree){

  const bx=p.sx, by=p.sy, th=tree.height*sc;

  ctx.beginPath(); ctx.moveTo(bx,by); ctx.quadraticCurveTo(bx+sway*.8+lean*.5, by-th*.55, bx+sway+lean, by-th); ctx.stroke();
  ctx.strokeStyle='#7a5c10'; ctx.lineWidth=1.5*sc;
  for(let i=1;i<=5;i++){
    const t=i/6, tx=bx+(sway+lean)*t, ty=by-th*t;
    ctx.beginPath(); ctx.moveTo(tx-3*sc,ty); ctx.lineTo(tx+3*sc,ty); ctx.stroke();
  }
  const topX=bx+sway+lean, topY=by-th, fp=['#27ae60','#2ecc71','#1e8449','#16a085'];
  for(let f=0;f<7;f++){
    const ang=(f/7)*TAU+Math.sin(gameTime*.025+tree.sway+f)*.1, fl=(38+(tree.seed+f*7)%22)*sc;
    ctx.strokeStyle=fp[f%4]; ctx.lineWidth=Math.max(1,3*sc); ctx.lineCap='round';
    const ex=topX+Math.cos(ang)*fl, ey=topY+Math.sin(ang)*fl*.55+14*sc;
    ctx.beginPath(); ctx.moveTo(topX,topY); ctx.quadraticCurveTo(topX+Math.cos(ang)*fl*.5, topY+Math.sin(ang)*fl*.35+8*sc, ex,ey); ctx.stroke();
    ctx.fillStyle=fp[(f+1)%4];
    for(let l=1;l<=4;l++){
      const lt=l/5, lx=topX+(ex-topX)*lt, ly=topY+(ey-topY)*lt;
      ctx.save(); ctx.translate(lx,ly); ctx.rotate(ang+Math.PI/2);
      ctx.beginPath(); ctx.ellipse(0,0,7*sc,3*sc,0,0,TAU); ctx.fill(); ctx.restore();
    }
  }
  ctx.restore();

// ── player movement ──────────────────────────────────────────────
function updatePlayer(){
  let mx=0, mz=0;
  
  // Gather input directions
  if(keys[controls.forward])  mz += 1;
  if(keys[controls.backward]) mz -= 1;
  if(keys[controls.left])     mx -= 1;
  if(keys[controls.right])    mx += 1;
  
  if(mx!==0||mz!==0){
    // Normalize the movement vector so walking diagonally isn't faster
    const len=Math.sqrt(mx*mx+mz*mz); mx/=len; mz/=len;
    
    // Convert movement relative to the player's current yaw (camera direction)
    const cos=Math.cos(player.yaw), sin=Math.sin(player.yaw);
    // Only apply the movement if the path is clear (this allows sliding against edges)
    player.x += (mx*cos + mz*sin) * player.speed;
    player.z += (-mx*sin + mz*cos) * player.speed;
    //Slide around palm trees
    if (currentLevel.shape === 'circle') {
      for(let t of palmTrees) {
        const dx = player.x - t.wx, dz = player.z - t.wz;
        const dist = Math.hypot(dx, dz);
        const minDist = player.radius + 12; // 12 represents the trunk radius
        
        if (dist < minDist && dist > 0) {
          const overlap = minDist - dist;
          player.x += (dx / dist) * overlap; 
          player.z += (dz / dist) * overlap; 
        }
      }
    }
    // Slide around enemies
    for(let e of enemies) {
      const dx = player.x - e.x, dz = player.z - e.z;
      const dist = Math.hypot(dx, dz), minDist = player.radius + e.bw * 0.45;
      
      if (dist < minDist && dist > 0) {
        const overlap = minDist - dist;
        player.x += (dx / dist) * overlap; // Push out along the X angle
        player.z += (dz / dist) * overlap; // Push out along the Z angle
      }
    }

    // Boundary check
    if (currentLevel.shape === 'circle') {
      const d = Math.sqrt(player.x*player.x + player.z*player.z);
      if(d > currentLevel.radius){ player.x=player.x/d*currentLevel.radius; player.z=player.z/d*currentLevel.radius; }
    } else {
      const hw = currentLevel.width / 2, hd = currentLevel.depth / 2;
      // Keep player inside the walls
      player.x = clamp(player.x, -hw + player.radius, hw - player.radius);
      player.z = clamp(player.z, -hd + player.radius, hd - player.radius);
    }
  }
  
  // Keyboard camera controls
  if(keys['ArrowLeft'])  player.yaw -= 0.035 * mouseSensitivity;
  if(keys['ArrowRight']) player.yaw += 0.035 * mouseSensitivity;
  if(keys['ArrowUp'])    player.pitch -= 0.07 * mouseSensitivity;
  if(keys['ArrowDown'])  player.pitch += 0.07 * mouseSensitivity;
  
  // Clamp pitch so the player can't flip their neck backwards
  player.pitch = clamp(player.pitch, -2.8, 2.8);
}

// ── bullets ──────────────────────────────────────────────────────
function spawnBullet(){
  const speed=22;
  const vx = Math.sin(player.yaw) * speed;
  const vz = Math.cos(player.yaw) * speed;
  const vy = -player.pitch * speed; 
  bullets.push({
    x: player.x, y: CAMERA_HEIGHT - 5, z: player.z,
    vx: vx,
    vy: vy,
    vz: vz,
    life: 90, damage: gunDamage, trail: []
  });
  for(let i=0;i<8;i++){
    const a=Math.random()*TAU, s=2+Math.random()*3;
    particles.push({ss:true, sx:W*.5+W*.18, sy:H-80, vx:Math.cos(a)*s*2, vy:Math.sin(a)*s, life:12,maxLife:12,col:'#ce93d8',r:3});
  }
}
function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; 
    b.trail.push({x:b.x, y:b.y, z:b.z}); 
    if(b.trail.length>6) b.trail.shift();
    b.x += b.vx; b.y += b.vy; b.z += b.vz; 

    if (b.y <= 0) {
      const floorColor = (currentLevel.shape === 'circle') ? '#d4b46a' : (currentLevel.floorBottom || '#c68642');
      for(let p=0; p<6; p++){
        const a = Math.random() * TAU, s = 1 + Math.random() * 2;
        particles.push({ x: b.x, z: b.z, vx: Math.cos(a)*s, vz: Math.sin(a)*s, vy_acc: 0, vy_init: -2 - Math.random()*2, life: 15, maxLife: 15, col: floorColor, r: 2 + Math.random()*3 });
      }
      bullets.splice(i, 1); continue; 
    }
    
    if (currentLevel.shape === 'square') {
      const hw = currentLevel.width / 2, hd = currentLevel.depth / 2;
      // If bullet crosses the wall boundary and isn't going out an open door...
      if (b.x < -hw || b.x > hw || b.z < -hd || b.z > hd) {
        if (Math.abs(b.x) > 60 && Math.abs(b.z) > 60) { // Don't block bullets going through doors!
          for(let p=0; p<8; p++){
            const a = Math.random() * TAU, s = 1 + Math.random() * 3;
            particles.push({ x: b.x, y: b.y, z: b.z, vx: Math.cos(a)*s, vz: Math.sin(a)*s, vy_acc: 0, vy_init: -1 - Math.random()*3, life: 18, maxLife: 18, col: Math.random() > 0.5 ? '#f3b49f' : '#fff', r: 2 + Math.random()*4 });
          }
          bullets.splice(i, 1); continue; 
        }
      }
} else {
        for (let t of palmTrees) {
          let hitRadius;
          if (b.y > t.height * 0.7) {
            // 1. WE ARE IN THE LEAVES: Reduced canopy hitbox width
            hitRadius = 35; 
          } else {
            // 2. TRUNK: Narrow uniform radius matching the player collision
            hitRadius = 12; 
          }
          // Increased vertical limit to t.height + 120 to hit the top leaves
          if (Math.hypot(b.x - t.wx, b.z - t.wz) < hitRadius && b.y < t.height + 120 && b.y > -10) {
          
          if (Math.hypot(b.x - t.wx, b.z - t.wz) < hitRadius && b.y < t.height + 90 && b.y > -10) {
            for(let p=0; p<8; p++){
              const a = Math.random() * TAU, s = 1 + Math.random() * 3;
              particles.push({ x: b.x, y: b.y, z: b.z, vx: Math.cos(a)*s, vz: Math.sin(a)*s, vy_acc: 0, vy_init: -2 - Math.random()*3, life: 20, maxLife: 20, col: Math.random() > 0.3 ? '#7a5c10' : '#4caf50', r: 2 + Math.random()*4 });
            }
            bullets.splice(i, 1); break;
          }
        }
    }    b.life--; if(b.life<=0) bullets.splice(i,1);
  }
}
}
function drawBullets(){
  bullets.forEach(b=>{
    b.trail.forEach((t,idx)=>{
      const p=project(t.x, t.z, t.y); if(!p) return;
      ctx.save(); ctx.globalAlpha=(idx/b.trail.length)*.5; ctx.fillStyle='#d500f9'; ctx.shadowColor='#9c27b0'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.sx,p.sy,(idx/b.trail.length)*6,0,TAU); ctx.fill(); ctx.restore();
    });
    const p=project(b.x, b.z, b.y); if(!p) return;
    ctx.save(); ctx.shadowColor='#7b1fa2'; ctx.shadowBlur=20;
    const g=ctx.createRadialGradient(p.sx-2,p.sy-2,0,p.sx,p.sy,9);
    g.addColorStop(0,'#f3e5f5'); g.addColorStop(.45,'#ab47bc'); g.addColorStop(1,'#6a1b9a');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.sx,p.sy,9,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(p.sx-3,p.sy-3,3,0,TAU); ctx.fill(); ctx.restore();
  });
}

// ── enemies ──────────────────────────────────────────────────────
function getAvailableTypes(){ return COUCH_TYPES.filter(couch => currentLevel.enemies.includes(couch.id)); }

function spawnEnemy(){
  const types=getAvailableTypes(), type=types[Math.floor(Math.random()*types.length)];
  let ex, ez;
  if (currentLevel.shape === 'circle') {
      const ang=Math.random()*TAU, r=currentLevel.radius + 20;
      ex = player.x+Math.sin(ang)*r; ez = player.z+Math.cos(ang)*r;
  } else {
      const hw = currentLevel.width / 2, hd = currentLevel.depth / 2;
      const doors = [{x:0, z:-hd-80}, {x:0, z:hd+80}, {x:-hw-80, z:0}, {x:hw+80, z:0}];
      const d = doors[Math.floor(Math.random() * doors.length)];
      ex = d.x; ez = d.z;
  }
  enemies.push({x:ex, z:ez, ...type, hp:type.hp, maxHp:type.hp, spd:type.spd+(wave + currentLevel.difficultyOffset -1)*.04, flash:0, bob:Math.random()*TAU, attackTimer:0, frozen:0, burning:0, burnTickTimer:0});
}
function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    
    let tx = player.x, tz = player.z;
    
    // Level 1: Wall Collision & Doorway Pathfinding
    if (currentLevel.shape === 'square') {
      const hw = currentLevel.width / 2, hd = currentLevel.depth / 2, er = e.bw * 0.45;
      // If outside the inner room boundary, force them to walk to the center (0,0)
      if (Math.abs(e.x) > hw - er - 5 || Math.abs(e.z) > hd - er - 5) { 
        tx = 0; 
        tz = 0; 
      }
    }

    const dx = tx - e.x, dz = tz - e.z;
    const dist = Math.hypot(dx, dz) || 1;
    
    // Only stop moving if they are actively targeting the player
    const stopDist = (tx === player.x) ? (player.radius + e.bw * 0.45) : 0;
    
    if (dist > stopDist) { const slowMult = e.frozen > 0 ? 0.35 : 1; e.x += (dx/dist)*e.spd*slowMult; e.z += (dz/dist)*e.spd*slowMult; }
    
    // 3. TREE COLLISION (Slide around trunks)
    if (currentLevel.shape === 'circle') {
      for (let t of palmTrees) {
        const tdx = e.x - t.wx;
        const tdz = e.z - t.wz;
        const tDist = Math.hypot(tdx, tdz);
        const tMinDist = e.bw * 0.45 + 12; // Enemy radius + Tree trunk radius (12)

        if (tDist < tMinDist && tDist > 0) {
          const overlap = tMinDist - tDist;
          e.x += (tdx / tDist) * overlap; // Push out along X
          e.z += (tdz / tDist) * overlap; // Push out along Z

          //enemies slip through trees when stuck
          e.x += (-tdz / tDist) * 1.5; 
          e.z += (tdx / tDist) * 1.5;
        }
      }
    }

    // 4. ENEMY-TO-ENEMY COLLISION (Prevent merging)
    for(let j=0; j<enemies.length; j++){
      if(i === j) continue; // Don't collide with self
      const other = enemies[j];
      const edx = e.x - other.x;
      const edz = e.z - other.z;
      const eDist = Math.hypot(edx, edz);
      const eMinDist = (e.bw * 0.45) + (other.bw * 0.45);

      if (eDist < eMinDist && eDist > 0) {
        const overlap = eMinDist - eDist;
        // Push this enemy away from the other enemy by half the overlap 
        // (the other enemy will push itself away on its own loop iteration)
        e.x += (edx / eDist) * (overlap * 0.5); 
        e.z += (edz / eDist) * (overlap * 0.5); 
      }
    }
    
    if(e.flash>0) e.flash--;
    if(e.frozen>0) e.frozen--;
    if(e.burning>0){
      e.burning--;
      // gentle continuous flame flicker particles, purely visual
      if(gameTime % 6 === 0){
        particles.push({x:e.x,z:e.z, vx:(Math.random()-.5)*0.8, vz:(Math.random()-.5)*0.8, vy_acc:0, vy_init:-1.5-Math.random()*1.5, life:18, maxLife:18, col: Math.random()>0.4?'#ff7043':'#ffca28', r:2+Math.random()*2.5});
      }
      e.burnTickTimer--;
      if(e.burnTickTimer<=0){
        e.burnTickTimer = 30; // one damage tick roughly every half second
        e.hp -= 1; e.flash = 6;
        for(let p2=0;p2<6;p2++){ particles.push({x:e.x,z:e.z, vx:(Math.random()-.5)*2, vz:(Math.random()-.5)*2, vy_acc:0, vy_init:-2-Math.random()*3, life:22, maxLife:22, col:'#ff5722', r:3+Math.random()*3}); }
        if(e.hp<=0){
          for(let p2=0;p2<26;p2++){ particles.push({x:e.x,z:e.z,vx:Math.cos(Math.random()*TAU)*(3+Math.random()*5),vz:Math.sin(Math.random()*TAU)*(3+Math.random()*5), vy_acc:0,vy_init:-5-Math.random()*4,life:42,maxLife:42,col:e.col,r:6+Math.random()*8}); }
          score+=e.pts; kills++; if(score>=nextPowerupScore){ nextPowerupScore+=1500; spawnPowerup(); }
          scoreFloats.push({x:e.x,z:e.z,text:'+'+e.pts,col:'#ffeb3b',life:70,maxLife:70,rise:0});
          enemies.splice(i,1);
          continue; // this enemy is gone, skip the rest of its processing this frame
        }
      }
    }
    if(dist <= stopDist + 15){
      e.attackTimer++;
      if(e.attackTimer > 45){ e.attackTimer=0; playerHit(); e.x -= (dx/dist)*25; e.z -= (dz/dist)*25; }
    } else if(e.attackTimer > 0) e.attackTimer--;
    let dead=false;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(Math.hypot(b.x-e.x,b.z-e.z)<e.bw*.45 && b.y < e.bh +5 && b.y > -10){
        e.hp-=b.damage; e.flash=8; bullets.splice(j,1);
        if(activePowerup === 'freeze'){ e.frozen = 240; }
        if(activePowerup === 'fire'){
          if(e.burning <= 0){ e.burning = 180; e.burnTickTimer = 30; } // ignite fresh, start ticking
          else { e.burning = 180; } // refresh duration only - don't add a second stacking tick
        }
        for(let p2=0;p2<12;p2++){ particles.push({x:e.x,z:e.z,vx:Math.cos(Math.random()*TAU)*(2+Math.random()*4),vz:Math.sin(Math.random()*TAU)*(2+Math.random()*4), vy_acc:0,vy_init:-3-Math.random()*3,life:22,maxLife:22,col:e.col,r:4+Math.random()*4}); }
        if(e.hp<=0){
          for(let p2=0;p2<26;p2++){ particles.push({x:e.x,z:e.z,vx:Math.cos(Math.random()*TAU)*(3+Math.random()*5),vz:Math.sin(Math.random()*TAU)*(3+Math.random()*5), vy_acc:0,vy_init:-5-Math.random()*4,life:42,maxLife:42,col:e.col,r:6+Math.random()*8}); }
          score+=e.pts; kills++; if(score>=nextPowerupScore){ nextPowerupScore+=1500; spawnPowerup(); }
          scoreFloats.push({x:e.x,z:e.z,text:'+'+e.pts,col:'#ffeb3b',life:70,maxLife:70,rise:0});
          enemies.splice(i,1); dead=true;
        } break;
      }
    } if(dead) continue;
  }
}

// ── power-ups ────────────────────────────────────────────────────
function spawnPowerup() {
  const ang = Math.random() * TAU;
  const dist = 40 + Math.random() * 110;
  let px = player.x + Math.sin(ang) * dist, pz = player.z + Math.cos(ang) * dist;
  if (currentLevel.shape === 'circle') {
    const d = Math.hypot(px, pz);
    if (d > currentLevel.radius - 30) { px = (px / d) * (currentLevel.radius - 30); pz = (pz / d) * (currentLevel.radius - 30); }
  } else {
    px = clamp(px, -currentLevel.width/2 + 30, currentLevel.width/2 - 30);
    pz = clamp(pz, -currentLevel.depth/2 + 30, currentLevel.depth/2 - 30);
  }
  const r = Math.random();
  const type = r < 0.2 ? 'rapidfire' : r < 0.4 ? 'heavyshot' : r < 0.6 ? 'freeze' : r < 0.8 ? 'fire' : 'health';
  powerups.push({ x: px, z: pz, type: type, bob: Math.random() * TAU, pulse: 0 });
}
function updatePowerups(){
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i]; p.pulse++;
    if(Math.hypot(player.x-p.x,player.z-p.z)<player.radius+30){ collectPowerup(p.type,p.x,p.z); powerups.splice(i,1); }
  }
}
function collectPowerup(type, wx, wz) {
  const c = POWERUP_COLOR[type] || '#e53935';
  if (type === 'health') lives = 3; else { activePowerup = type; powerupTimer = POWERUP_DURATION; gunFireRate = type === 'rapidfire' ? 5 : 18; gunDamage = type === 'heavyshot' ? 2 : 1; }
  for (let i = 0; i < 22; i++) {
    particles.push({ x: wx, z: wz, vx: Math.cos(Math.random() * TAU) * (3 + Math.random() * 5), vz: Math.sin(Math.random() * TAU) * (3 + Math.random() * 5), vy_acc: 0, vy_init: -6 - Math.random() * 4, life: 40, maxLife: 40, col: c, r: 5 + Math.random() * 6 });
  }
}
function resetPowerup(){ activePowerup=null; gunFireRate=18; gunDamage=1; }
// Transform world coordinates relative to where the player is looking
function transformToCameraSpace(wx, wz) {
  const dx = wx - player.x;
  const dz = wz - player.z;
  const cosYaw = Math.cos(player.yaw);
  const sinYaw = Math.sin(player.yaw);
  const x = dx * cosYaw - dz * sinYaw;
  const z = dx * sinYaw + dz * cosYaw;
  return { x, z };
}

// Renders a true 3D wall polygon from point A to point B
// Notice the 'bottomY = 0' added to the end of this line!
function drawWallPanel(wx1, wz1, wx2, wz2, height, color, bottomY = 0) {
  let p1 = transformToCameraSpace(wx1, wz1);
  let p2 = transformToCameraSpace(wx2, wz2);

  // Near plane clipping: discard if entirely behind the camera
  if (p1.z < 1 && p2.z < 1) return; 
  
  // Clip partially hidden walls against the z=1 plane
  if (p1.z < 1) {
    let t = (1 - p1.z) / (p2.z - p1.z);
    p1.x = p1.x + t * (p2.x - p1.x);
    p1.z = 1;
  } else if (p2.z < 1) {
    let t = (1 - p2.z) / (p1.z - p2.z);
    p2.x = p2.x + t * (p1.x - p2.x);
    p2.z = 1;
  }

  const fovFactor = W / (2 * Math.tan(FOV_HALF));
  const cy = H * HORIZON - (player.pitch * fovFactor);
  
  // Project the floor and ceiling onto the screen
  // (Using MINUS signs here, not slashes!)
  const sy1_b = cy + (CAMERA_HEIGHT - bottomY) / p1.z * fovFactor;
  const sy1_t = cy + (CAMERA_HEIGHT - height) / p1.z * fovFactor;
  const sy2_b = cy + (CAMERA_HEIGHT - bottomY) / p2.z * fovFactor;
  const sy2_t = cy + (CAMERA_HEIGHT - height) / p2.z * fovFactor;

  const sx1 = W/2 + p1.x / p1.z * fovFactor;
  const sx2 = W/2 + p2.x / p2.z * fovFactor;

  // Draw the wall polygon
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(sx1, sy1_t);
  ctx.lineTo(sx2, sy2_t);
  ctx.lineTo(sx2, sy2_b);
  ctx.lineTo(sx1, sy1_b);
  ctx.closePath();
  ctx.fill();
  
  // Optional: faint line between panels for depth perception
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
// Draws horizontal planes (like the top of the TV)
function drawHorizontalPoly(points, y, color) {
  const proj = [];
  for(let pt of points) {
    let p = transformToCameraSpace(pt.x, pt.z);
    // Simple clip: if any corner is behind the camera, skip drawing the top
    if(p.z < 1) return; 
    const fovFactor = W / (2 * Math.tan(FOV_HALF));
    const cy = H * HORIZON - (player.pitch * fovFactor);
    proj.push({ sx: W/2 + p.x/p.z * fovFactor, sy: cy + (CAMERA_HEIGHT - y)/p.z * fovFactor });
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(proj[0].sx, proj[0].sy);
  for(let i=1; i<proj.length; i++) ctx.lineTo(proj[i].sx, proj[i].sy);
  ctx.closePath();
  ctx.fill();
}
// Upgraded horizontal polygon renderer with near-plane Z-clipping
function drawClippedHorizontalPoly(wx, wz, hw, hd, y, color) {
  const corners = [
    {x: wx - hw, z: wz - hd}, {x: wx + hw, z: wz - hd},
    {x: wx + hw, z: wz + hd}, {x: wx - hw, z: wz + hd}
  ];

  // Transform to camera space
  let camPoints = corners.map(pt => transformToCameraSpace(pt.x, pt.z));

  // Clip the polygon against the camera lens (Z = 1)
  let clipped = [];
  for (let i = 0; i < camPoints.length; i++) {
    let p1 = camPoints[i];
    let p2 = camPoints[(i + 1) % camPoints.length];

    if (p1.z >= 1) clipped.push(p1);

    // If the line segment crosses the Z=1 plane, find the exact intersection
    if ((p1.z >= 1 && p2.z < 1) || (p1.z < 1 && p2.z >= 1)) {
      let t = (1 - p1.z) / (p2.z - p1.z);
      clipped.push({ x: p1.x + t * (p2.x - p1.x), z: 1 });
    }
  }

  // If there aren't enough points left to make a shape, stop
  if (clipped.length < 3) return; 

  const fovFactor = W / (2 * Math.tan(FOV_HALF));
  const cy = H * HORIZON - (player.pitch * fovFactor);

  // Draw the clipped ceiling
  ctx.fillStyle = color;
  ctx.beginPath();
  clipped.forEach((p, index) => {
    const sx = W/2 + p.x / p.z * fovFactor;
    const sy = cy + (CAMERA_HEIGHT - y) / p.z * fovFactor;
    if (index === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  });
  ctx.closePath();
  ctx.fill();
}
// Assembles a 3D box out of panels and sorts them so they render correctly
function draw3DBox(cx, cz, w, d, bottomY, topY, colors) {
  const hw = w/2, hd = d/2;
  const corners = [
    {x: cx-hw, z: cz-hd}, {x: cx+hw, z: cz-hd},
    {x: cx+hw, z: cz+hd}, {x: cx-hw, z: cz+hd}
  ];

  // Draw the top panel
  drawHorizontalPoly(corners, topY, colors.top);

  // Define the 4 side faces
  const faces = [
    { p1: corners[0], p2: corners[1], color: colors.front },
    { p1: corners[1], p2: corners[2], color: colors.right },
    { p1: corners[2], p2: corners[3], color: colors.back },
    { p1: corners[3], p2: corners[0], color: colors.left }
  ];

  // Sort faces by distance to player (draw furthest walls first)
  faces.forEach(f => {
    f.dist = Math.hypot(((f.p1.x + f.p2.x)/2) - player.x, ((f.p1.z + f.p2.z)/2) - player.z);
  });
  faces.sort((a, b) => b.dist - a.dist);

  faces.forEach(f => {
    drawWallPanel(f.p1.x, f.p1.z, f.p2.x, f.p2.z, topY, f.color, bottomY);
  });
}

    // Determine which way to push the painting off the wall so it doesn't clip

function drawSingleEnemy(e) {
  const p = project(e.x, e.z); 
  if (!p || p.cz > 650) return;
  let lungeScale = 1;
  if (e.attackTimer > 30) lungeScale = 1 + (e.attackTimer - 30) * 0.015;
  const sc = clamp(p.scale / 2, 0.2, 25) * lungeScale;
  const w = e.bw * sc, h = e.bh * sc, sx = p.sx, sy = p.sy;
  ctx.save(); ctx.fillStyle = 'rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(sx, sy, w * .55, Math.max(4, 8 * sc), 0, 0, TAU); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(sx, sy); ctx.scale(sc, sc); e.draw(e.bw, e.bh, e.col, e.acc, e.flash > 0);
  if (e.frozen > 0) {
    ctx.globalAlpha = 0.42;
    ctx.fillStyle = '#4fc3f7';
    ctx.beginPath(); ctx.ellipse(0, 0, e.bw * .52, e.bh * .58, 0, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (e.burning > 0) {
    ctx.globalAlpha = 0.28 + Math.sin(gameTime * .3) * 0.08;
    ctx.fillStyle = '#ff5722';
    ctx.beginPath(); ctx.ellipse(0, 0, e.bw * .52, e.bh * .58, 0, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
  if (e.hp < e.maxHp) {
    const bw = w * 1.1, bh = Math.max(3, 7 * sc), bx = sx - bw / 2, by = sy - h * .7 - bh - 4;
    ctx.fillStyle = '#222'; rrFill(bx, by, bw, bh, 2);
    const pct = e.hp / e.maxHp; ctx.fillStyle = pct > .5 ? '#4caf50' : pct > .25 ? '#ff9800' : '#f44336'; rrFill(bx, by, bw * pct, bh, 2);
  }
}

function drawSinglePowerup(p) {
  const pr = project(p.x, p.z); 
  if (!pr || pr.cz > 450) return;
  const sc = clamp(pr.scale / 2, 0.2, 15), bob = Math.sin(gameTime * .055 + p.bob) * 7 * sc, sx = pr.sx, sy = pr.sy - 32 * sc + bob, sz = 26 * sc;
  const color = POWERUP_COLOR[p.type] || '#e53935', icon = POWERUP_ICON[p.type] || '❤', label = POWERUP_LABEL[p.type] || 'HEALTH';
  ctx.save(); ctx.fillStyle = 'rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(sx, pr.sy, sz * .9, sz * .22, 0, 0, TAU); ctx.fill();
  ctx.shadowColor = color; ctx.shadowBlur = 20 * sc; ctx.strokeStyle = color; ctx.lineWidth = 2 * sc; ctx.globalAlpha = .45 + Math.sin(gameTime * .09) * .35; ctx.beginPath(); ctx.arc(sx, sy, (sz + 6) * (.82 + Math.sin(gameTime * .09) * .18), 0, TAU); ctx.stroke(); ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(5,5,20,.85)'; rrFill(sx - sz, sy - sz, sz * 2, sz * 2, sz * .25); ctx.strokeStyle = color; ctx.lineWidth = 2 * sc; rrStroke(sx - sz, sy - sz, sz * 2, sz * 2, sz * .25);

// ── MASTER RENDER QUEUE ──────────────────────────────────────────
function drawEntities() {
  let renderList = [];
  
  if (currentLevel.shape === 'square') {
    roomProps.forEach(prop => {
      let sortDist = Math.hypot(prop.wx - player.x, prop.wz - player.z);
      
      // DEPTH BIAS: Artificially pull the painting 25 units closer during sorting
      // This guarantees it is drawn AFTER the wall segments it touches.
      if (prop.type === 'painting') {
        sortDist -= 25; 
      }
      
      renderList.push({ dist: sortDist, type: 'prop', data: prop });
    });
  }
  if (currentLevel.shape === 'circle') {
    palmTrees.forEach(t => renderList.push({ dist: Math.hypot(t.wx - player.x, t.wz - player.z), type: 'tree', data: t }));
  }
  enemies.forEach(e => renderList.push({ dist: Math.hypot(e.x - player.x, e.z - player.z), type: 'enemy', data: e }));
  powerups.forEach(p => renderList.push({ dist: Math.hypot(p.x - player.x, p.z - player.z), type: 'powerup', data: p }));
  
  // The Painter's Algorithm: Sort from furthest to closest
  renderList.sort((a, b) => b.dist - a.dist);
  
  // Draw them strictly in depth order
  renderList.forEach(item => {
    if (item.type === 'tree') drawPalmTree(item.data); // (Your drawPalmTree function stays exactly the same!)
    else if (item.type === 'enemy') drawSingleEnemy(item.data);
    else if (item.type === 'powerup') drawSinglePowerup(item.data);
    else if (item.type === 'prop') drawSingleProp(item.data);
  });
}

// ── particles & floats ───────────────────────────────────────────
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; if(p.ss){ p.sx+=p.vx; p.sy+=p.vy; p.vy+=.3; } else { p.x+=p.vx; p.z+=p.vz; if(p.vy_acc===undefined) p.vy_acc=p.vy_init||0; p.vy_acc+=.3; }
    p.life--; if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    if(p.ss){ ctx.save(); ctx.globalAlpha=a*.9; ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(p.sx,p.sy,Math.max(.5,p.r*a),0,TAU); ctx.fill(); ctx.restore(); } 
    else {
      const pr=project(p.x,p.z, p.y || 0); 
      if(!pr) return; 
      const sc=clamp(pr.scale/2, 0.1, 15), screenY=pr.sy+(p.vy_acc||0)*sc*2.5;
      ctx.save(); ctx.globalAlpha=a*.9; ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=9; ctx.beginPath(); ctx.arc(pr.sx,screenY,Math.max(.5,p.r*sc*a),0,TAU); ctx.fill(); ctx.restore();
    }
  });
}
function updateScoreFloats(){ for(let i=scoreFloats.length-1;i>=0;i--){ scoreFloats[i].rise+=.5; scoreFloats[i].life--; if(scoreFloats[i].life<=0) scoreFloats.splice(i,1); } }
function drawScoreFloats(){

}

function drawWaveTransition() {
  if (waveAnimTimer <= 0) return;
  waveAnimTimer--;
  const maxTime = 180, t = maxTime - waveAnimTimer;
  let alpha = 1;
  if (t < 30) alpha = t / 30; else if (t > 150) alpha = (maxTime - t) / 30;
  let currentNum = waveAnimOld, flipScale = 1;
  if (t >= 75 && t <= 105) {
    if (t < 90) flipScale = 1 - ((t - 75) / 15); else { flipScale = ((t - 90) / 15); currentNum = waveAnimNew; }
  } else if (t > 105) currentNum = waveAnimNew;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, H/2 - 50, W, 100);
  ctx.textBaseline = 'middle'; ctx.font = 'bold ' + Math.min(54, W*.08) + 'px "Courier New",monospace';
  ctx.shadowColor = '#ff9800'; ctx.shadowBlur = 20; ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.fillText('WAVE ', W/2, H/2);
  ctx.textAlign = 'left'; ctx.fillStyle = '#ffeb3b';
  ctx.translate(W/2, H/2); ctx.scale(1, Math.max(0.01, flipScale)); ctx.fillText(currentNum, 0, 0);
  ctx.restore();
}

function playerHit(){
  lives--; hitFlash=35; shakeMag=18;
  for(let i=0;i<16;i++){ particles.push({ss:true,sx:W/2,sy:H/2,vx:Math.cos(Math.random()*TAU)*10,vy:Math.sin(Math.random()*TAU)*10-5, life:38,maxLife:38,col:'#ef5350',r:9}); }
  if(lives<=0){ gState='gameover'; cancelAnimationFrame(gameRAF); canvas.style.cursor='default'; if(document.exitPointerLock) document.exitPointerLock(); menuLoop(); }
}
function updateSpawning(){
  if (waveAnimTimer > 0) return;
  
  // --- BOSS & VICTORY LOGIC ---
  if (currentLevel.maxWaves && wave > currentLevel.maxWaves) {
    if (!currentLevel.bossSpawned) {
      const bossType = COUCH_TYPES.find(c => c.id === currentLevel.boss);
      
      // Spawn at the top doorway for Level 1, or North edge for circular maps
      let bx = 0, bz = 0;
      if (currentLevel.shape === 'square') bz = -currentLevel.depth/2 - 80;
      else bz = -currentLevel.radius - 20;
      
      enemies.push({x:bx, z:bz, ...bossType, hp:bossType.hp, maxHp:bossType.hp, spd:bossType.spd, flash:0, bob:0, attackTimer:0, frozen:0, burning:0, burnTickTimer:0});
      currentLevel.bossSpawned = true;
    }
    
    // If the boss is spawned and all enemies are dead, YOU WIN!
    if (currentLevel.bossSpawned && enemies.length === 0) {
      gState = 'victory'; 
      localStorage.setItem(currentLevel.id + '_cleared', 'true');
      cancelAnimationFrame(gameRAF); 
      canvas.style.cursor = 'default'; 
      if(document.exitPointerLock) document.exitPointerLock(); 
      menuLoop();
    }
    return; // Halt normal endless spawning
  }

  // --- NORMAL WAVE LOGIC ---
  waveTimer++;
  if (waveTimer < waveInterval) {
    spawnTimer++;
    if (spawnTimer >= spawnInterval && enemies.length < 3 + (wave + (currentLevel.difficultyOffset || 0)) * 2) { 
      spawnTimer = 0; spawnEnemy(); 
      if (wave >= 3 && Math.random() < .28) spawnEnemy(); 
      if (wave >= 6 && Math.random() < .22) spawnEnemy(); 
    }
  } else if (enemies.length === 0) {
    waveTimer = 0; spawnTimer = 0; 
    
    // Check if the next wave is the Boss wave
    if (currentLevel.maxWaves && wave === currentLevel.maxWaves) {
        wave++; 
        waveAnimOld = wave - 1; 
        waveAnimNew = "BOSS"; 
        waveAnimTimer = 180;
    } else {
        waveAnimOld = wave; wave++; waveAnimNew = wave; waveAnimTimer = 180;
        spawnInterval = Math.max(38, spawnInterval - 8); waveInterval = Math.max(900, waveInterval - 90);
    }
  }
}

  ctx.shadowColor = '#0288d1'; 
  ctx.shadowBlur = 20; 
  ctx.font = 'bold ' + Math.min(74, Math.round(W * 0.1)) + 'px "Courier New",monospace'; 
  ctx.fillStyle = '#fff'; 
  ctx.fillText('PAUSED', W / 2, H * 0.3); 
  ctx.restore();
}

function menuLoop(){
  menuTime++; 
  if(isTouchDevice) mobileControlsEl.classList.remove('active');
  if(isTouchDevice) btnFullscreenEl.classList.add('active');
  if(gState==='paused') {
    ctx.save(); ctx.translate(shakeX,shakeY); ctx.clearRect(-30,-30,W+60,H+60);
    drawSky(); drawGround(); drawShoreBoundary(); drawGroundDetails(); drawCeiling();
    drawEntities();
    drawBullets(); drawParticles(); drawScoreFloats(); drawGun();
    ctx.restore(); drawHUD(); drawPauseScreen(); 
  } else {
    ctx.clearRect(0,0,W,H);
    if(gState==='start') drawStartScreen(); else if(gState==='levelselect') { const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#020d1e'); bg.addColorStop(1,'#160429'); ctx.fillStyle=bg; ctx.fillRect(0,0,W,H); ctx.save(); ctx.textAlign='center'; ctx.font='bold 40px "Courier New",monospace'; ctx.fillStyle='#fff'; ctx.fillText('SELECT A LEVEL', W/2, H*0.15); ctx.restore(); }
    else if(gState==='confirm_reset') {
      // 1. Draw the normal level select background
      const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#020d1e'); bg.addColorStop(1,'#160429'); ctx.fillStyle=bg; ctx.fillRect(0,0,W,H); 
      
      // 2. Draw a dark semi-transparent overlay to focus attention
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);

      // 3. Draw the red warning box
      const boxW = Math.min(500, W * 0.9);
      const boxH = 220;
      const boxX = W/2 - boxW/2;
      const boxY = H/2 - boxH/2 - 40;

      ctx.save();
      ctx.shadowColor = '#c62828'; ctx.shadowBlur = 30;
      ctx.fillStyle = '#111';
      rrFill(boxX, boxY, boxW, boxH, 16); // Re-using your rounded rect function
      ctx.strokeStyle = '#c62828'; ctx.lineWidth = 4;
      rrStroke(boxX, boxY, boxW, boxH, 16);

      // 4. Draw the warning text
      ctx.shadowBlur = 0;
      ctx.textAlign = 'center';
      ctx.font = 'bold 32px "Courier New",monospace';
      ctx.fillStyle = '#ef5350';
      ctx.fillText('WARNING', W/2, boxY + 50);

      ctx.font = '18px "Courier New",monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText('Are you sure you want to delete', W/2, boxY + 100);
      ctx.fillText('all your saved level progress?', W/2, boxY + 130);
      ctx.fillText('This action cannot be undone.', W/2, boxY + 160);
      ctx.restore();
    }
    else if(gState==='settings') {
      const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#020d1e'); bg.addColorStop(1,'#041a38'); ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      const L = getSettingsLayout();
      ctx.save();
      ctx.textAlign='center'; ctx.font='bold '+Math.min(40,Math.round(H*0.09))+'px "Courier New",monospace'; ctx.fillStyle='#fff'; ctx.fillText('SETTINGS & CONTROLS', W/2, L.titleY);
      ctx.font='16px "Courier New",monospace'; ctx.fillStyle='#aaa';
      ctx.fillText(isTouchDevice ? 'Drag anywhere on screen to look around. Tap FIRE to shoot.' : 'Looking around is tied to Mouse Movement. Left Click also fires.', W/2, L.sensLabelY - 22);
      ctx.fillStyle='#aaa'; ctx.fillText('Mouse & Arrow-Key Look Sensitivity', W/2, L.sensLabelY);
      ctx.font='bold 22px "Courier New",monospace'; ctx.fillStyle='#ffeb3b'; ctx.fillText(mouseSensitivity.toFixed(1) + 'x', W/2, L.sensRowY);
      ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.font='bold 22px "Courier New",monospace'; ctx.fillStyle='#fff';
      const list = [{y:L.rowY[0]+20, lbl:'Move Forward'}, {y:L.rowY[1]+20, lbl:'Move Backward'}, {y:L.rowY[2]+20, lbl:'Move Left'}, {y:L.rowY[3]+20, lbl:'Move Right'}, {y:L.rowY[4]+20, lbl:'Secondary Shoot'}, {y:L.rowY[5]+20, lbl:'Pause Game'}];
      list.forEach(item => ctx.fillText(item.lbl, W/2 - 20, item.y));
      ctx.restore();
    }
    else if(gState==='gameover' || gState==='victory') { 
      ctx.fillStyle='rgba(0,0,0,.82)'; ctx.fillRect(0,0,W,H); 
      ctx.save(); ctx.textAlign='center'; 
      
      const isWin = gState === 'victory';
      ctx.shadowColor = isWin ? '#4caf50' : '#f44336'; 
      ctx.shadowBlur=40; 
      ctx.font='bold '+Math.min(76,Math.round(W*.1))+'px "Courier New",monospace'; 
      ctx.fillStyle = isWin ? '#81c784' : '#ef5350'; 
      ctx.fillText(isWin ? 'LEVEL CLEARED!' : 'GAME OVER', W/2, H*.3); 
      ctx.shadowBlur=0; 
      
      ctx.font='bold '+Math.min(34,Math.round(W*.047))+'px "Courier New",monospace'; 
      ctx.fillStyle='#fff'; ctx.fillText('FINAL SCORE: '+score,W/2,H*.42); 
      ctx.font=Math.min(20,Math.round(W*.028))+'px "Courier New",monospace'; 
      ctx.fillStyle='#bdbdbd'; 
      ctx.fillText(isWin ? 'Boss Defeated!   Couches Destroyed: '+kills : 'Wave: '+wave+'   Couches Defeated: '+kills, W/2, H*.51); 
      ctx.restore(); 
    }
  }
  drawButtons(); menuRAF=requestAnimationFrame(menuLoop);
}

// ── main loop ────────────────────────────────────────────────────
function gameLoop(){
  if(isTouchDevice) mobileControlsEl.classList.add('active');
  if(isTouchDevice) btnFullscreenEl.classList.remove('active');
  gameTime++;
  if(shakeMag>0){ shakeX=(Math.random()-.5)*shakeMag; shakeY=(Math.random()-.5)*shakeMag; shakeMag*=.83; if(shakeMag<.5){shakeMag=0;shakeX=0;shakeY=0;} }
  ctx.save(); ctx.translate(shakeX,shakeY); ctx.clearRect(-30,-30,W+60,H+60);
  drawSky(); drawGround(); drawShoreBoundary(); drawGroundDetails(); drawCeiling();
  drawEntities();
  drawBullets(); drawParticles(); drawScoreFloats(); drawGun();
  if(hitFlash>0){ ctx.fillStyle='rgba(244,67,54,'+(hitFlash/35*.38)+')'; ctx.fillRect(-30,-30,W+60,H+60); hitFlash--; }
  ctx.restore(); drawHUD(); drawWaveTransition();
  updatePlayer();
  if((mouseDown || keys[controls.shoot]) && gunCooldown<=0){ spawnBullet(); gunCooldown=gunFireRate; }
  if(gunCooldown>0) gunCooldown--;
  updateBullets(); updateEnemies(); updatePowerups(); updateParticles(); updateScoreFloats(); updateSpawning();
  if(activePowerup){ powerupTimer--; if(powerupTimer<=0) resetPowerup(); }
  if(gState==='playing') gameRAF=requestAnimationFrame(gameLoop);
}

// ── init ────────────────────────────────────────────────────────
function startGame(levelIndex){
  currentLevel = LEVEL_DATA[levelIndex];
  currentLevel.bossSpawned = false;
  cancelAnimationFrame(menuRAF); cancelAnimationFrame(gameRAF); menuRAF=null; gameRAF=null;
  score=0; lives=3; kills=0; wave=currentLevel.startingWave; waveTimer=0; waveInterval=1800; spawnTimer=0; spawnInterval=currentLevel.baseSpawnInterval; gameTime=0;
  gunCooldown=0; gunFireRate=18; gunDamage=1; activePowerup=null; powerupTimer=0; hitFlash=0; shakeMag=0; shakeX=0; shakeY=0; nextPowerupScore=1500;
  waveAnimTimer=0; waveAnimOld=currentLevel.startingWave; waveAnimNew=currentLevel.startingWave+1;
  bullets=[]; enemies=[]; powerups=[]; particles=[]; scoreFloats=[]; mouseDown=false; hoveredBtn=null;
  player.x=0; player.z=0; player.yaw=0; player.pitch=0; for(const k in keys) delete keys[k];
  generateEnvironment(currentLevel);
  gState='playing'; canvas.style.cursor='none';
  gameRAF=requestAnimationFrame(gameLoop);
}

generateEnvironment(LEVEL_DATA[0]);
menuLoop();
</script>
</body>
